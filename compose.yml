services:
  mysql:
    image: mysql:9.0.1

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: ${ENV_ROOT_PASSWORD}
      MYSQL_USER: ${ENV_MYSQL_USER}
      MYSQL_PASSWORD: ${ENV_MYSQL_PASSWORD}
      MYSQL_DATABASE: cliente_pedido

    volumes:
      - cliente-pedido-db:/var/lib/mysql

volumes:
  cliente-pedido-db: